# ============================================================
#  Zammad - Docker Swarm Stack Configuration
#
#  Server IP  : 172.21.3.99
#  Reverse Proxy: Traefik v3 (SSL termination)
#  Management : Portainer CE + portainer-agent
#
#  CARA DEPLOY:
#    1. Pastikan Swarm sudah aktif: docker swarm init
#    2. Buat sertifikat SSL (lihat portainer/README.md)
#    3. Set env vars: export $(cat .env | grep -v ^# | xargs)
#    4. Deploy: docker stack deploy -c docker-stack.yml zammad
#
#  AKSES:
#    Portainer : http://172.21.3.99:9000
#    Zammad    : https://172.21.3.99
#    Traefik   : http://172.21.3.99:8088/dashboard/
# ============================================================

version: "3.9"

services:

  # ----------------------------------------------------------
  # 1. INIT: Inisialisasi database & konfigurasi awal Zammad
  #    Berjalan sekali, restart jika gagal (max 3x)
  # ----------------------------------------------------------
  zammad-init:
    image: zammad/zammad-docker-compose:latest
    command: ["zammad-init"]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
    depends_on:
      - zammad-postgresql
      - zammad-elasticsearch
      - zammad-memcached
      - zammad-redis
    environment:
      - POSTGRESQL_USER=${POSTGRESQL_USER}
      - POSTGRESQL_PASS=${POSTGRESQL_PASS}
      - POSTGRESQL_HOST=${POSTGRESQL_HOST}
      - POSTGRESQL_PORT=${POSTGRESQL_PORT}
      - POSTGRESQL_DB=${POSTGRESQL_DB}
      - POSTGRESQL_OPTIONS=${POSTGRESQL_OPTIONS}
      - ELASTICSEARCH_ENABLED=${ELASTICSEARCH_ENABLED}
      - ELASTICSEARCH_HOST=${ELASTICSEARCH_HOST}
      - ELASTICSEARCH_PORT=${ELASTICSEARCH_PORT}
      - ELASTICSEARCH_SCHEMA=${ELASTICSEARCH_SCHEMA}
      - ELASTICSEARCH_NAMESPACE=${ELASTICSEARCH_NAMESPACE}
      - ELASTICSEARCH_REINDEX=${ELASTICSEARCH_REINDEX}
      - MEMCACHE_SERVERS=${MEMCACHE_SERVERS}
      - REDIS_URL=${REDIS_URL}
      - RAILS_ENV=${RAILS_ENV}
      - RAILS_LOG_STDOUT=${RAILS_LOG_STDOUT}
      - RAILS_TRUSTED_PROXIES=${RAILS_TRUSTED_PROXIES}
      - ZAMMAD_FQDN=${ZAMMAD_FQDN}
    volumes:
      - zammad-storage:/opt/zammad/storage
    networks:
      - backend
      - frontend

  # ----------------------------------------------------------
  # 2. NGINX: Web server internal Zammad
  #    Hanya expose port 8080 secara internal.
  #    Traefik yang menghandle koneksi dari luar.
  # ----------------------------------------------------------
  zammad-nginx:
    image: zammad/zammad-docker-compose:latest
    command: ["zammad-nginx"]
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
        window: 120s
    depends_on:
      - zammad-init
      - zammad-railsserver
      - zammad-websocket
    environment:
      - POSTGRESQL_USER=${POSTGRESQL_USER}
      - POSTGRESQL_PASS=${POSTGRESQL_PASS}
      - POSTGRESQL_HOST=${POSTGRESQL_HOST}
      - POSTGRESQL_PORT=${POSTGRESQL_PORT}
      - POSTGRESQL_DB=${POSTGRESQL_DB}
      - POSTGRESQL_OPTIONS=${POSTGRESQL_OPTIONS}
      - ELASTICSEARCH_ENABLED=${ELASTICSEARCH_ENABLED}
      - ELASTICSEARCH_HOST=${ELASTICSEARCH_HOST}
      - ELASTICSEARCH_PORT=${ELASTICSEARCH_PORT}
      - ELASTICSEARCH_SCHEMA=${ELASTICSEARCH_SCHEMA}
      - ELASTICSEARCH_NAMESPACE=${ELASTICSEARCH_NAMESPACE}
      - ELASTICSEARCH_REINDEX=${ELASTICSEARCH_REINDEX}
      - MEMCACHE_SERVERS=${MEMCACHE_SERVERS}
      - REDIS_URL=${REDIS_URL}
      - RAILS_ENV=${RAILS_ENV}
      - RAILS_LOG_STDOUT=${RAILS_LOG_STDOUT}
      - RAILS_TRUSTED_PROXIES=${RAILS_TRUSTED_PROXIES}
      - ZAMMAD_FQDN=${ZAMMAD_FQDN}
    volumes:
      - zammad-storage:/opt/zammad/storage
    networks:
      - frontend
      - backend
      - proxy   # Agar bisa diakses Traefik

  # ----------------------------------------------------------
  # 3. RAILSSERVER: Core aplikasi Zammad (Ruby on Rails)
  # ----------------------------------------------------------
  zammad-railsserver:
    image: zammad/zammad-docker-compose:latest
    command: ["zammad-railsserver"]
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
        window: 120s
    depends_on:
      - zammad-init
      - zammad-memcached
      - zammad-redis
    environment:
      - POSTGRESQL_USER=${POSTGRESQL_USER}
      - POSTGRESQL_PASS=${POSTGRESQL_PASS}
      - POSTGRESQL_HOST=${POSTGRESQL_HOST}
      - POSTGRESQL_PORT=${POSTGRESQL_PORT}
      - POSTGRESQL_DB=${POSTGRESQL_DB}
      - POSTGRESQL_OPTIONS=${POSTGRESQL_OPTIONS}
      - ELASTICSEARCH_ENABLED=${ELASTICSEARCH_ENABLED}
      - ELASTICSEARCH_HOST=${ELASTICSEARCH_HOST}
      - ELASTICSEARCH_PORT=${ELASTICSEARCH_PORT}
      - ELASTICSEARCH_SCHEMA=${ELASTICSEARCH_SCHEMA}
      - ELASTICSEARCH_NAMESPACE=${ELASTICSEARCH_NAMESPACE}
      - MEMCACHE_SERVERS=${MEMCACHE_SERVERS}
      - REDIS_URL=${REDIS_URL}
      - RAILS_ENV=${RAILS_ENV}
      - RAILS_LOG_STDOUT=${RAILS_LOG_STDOUT}
      - RAILS_TRUSTED_PROXIES=${RAILS_TRUSTED_PROXIES}
      - ZAMMAD_FQDN=${ZAMMAD_FQDN}
    volumes:
      - zammad-storage:/opt/zammad/storage
    networks:
      - backend
      - frontend

  # ----------------------------------------------------------
  # 4. WEBSOCKET: Koneksi real-time notifikasi & chat
  # ----------------------------------------------------------
  zammad-websocket:
    image: zammad/zammad-docker-compose:latest
    command: ["zammad-websocket"]
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
        window: 120s
    depends_on:
      - zammad-init
      - zammad-railsserver
    environment:
      - POSTGRESQL_USER=${POSTGRESQL_USER}
      - POSTGRESQL_PASS=${POSTGRESQL_PASS}
      - POSTGRESQL_HOST=${POSTGRESQL_HOST}
      - POSTGRESQL_PORT=${POSTGRESQL_PORT}
      - POSTGRESQL_DB=${POSTGRESQL_DB}
      - POSTGRESQL_OPTIONS=${POSTGRESQL_OPTIONS}
      - ELASTICSEARCH_ENABLED=${ELASTICSEARCH_ENABLED}
      - ELASTICSEARCH_HOST=${ELASTICSEARCH_HOST}
      - ELASTICSEARCH_PORT=${ELASTICSEARCH_PORT}
      - ELASTICSEARCH_SCHEMA=${ELASTICSEARCH_SCHEMA}
      - ELASTICSEARCH_NAMESPACE=${ELASTICSEARCH_NAMESPACE}
      - ELASTICSEARCH_REINDEX=${ELASTICSEARCH_REINDEX}
      - MEMCACHE_SERVERS=${MEMCACHE_SERVERS}
      - REDIS_URL=${REDIS_URL}
      - RAILS_ENV=${RAILS_ENV}
      - RAILS_LOG_STDOUT=${RAILS_LOG_STDOUT}
      - ZAMMAD_FQDN=${ZAMMAD_FQDN}
    volumes:
      - zammad-storage:/opt/zammad/storage
    networks:
      - frontend

  # ----------------------------------------------------------
  # 5. SCHEDULER: Background jobs (email, notifikasi, dll)
  # ----------------------------------------------------------
  zammad-scheduler:
    image: zammad/zammad-docker-compose:latest
    command: ["zammad-scheduler"]
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
        window: 120s
    depends_on:
      - zammad-init
      - zammad-railsserver
    environment:
      - POSTGRESQL_USER=${POSTGRESQL_USER}
      - POSTGRESQL_PASS=${POSTGRESQL_PASS}
      - POSTGRESQL_HOST=${POSTGRESQL_HOST}
      - POSTGRESQL_PORT=${POSTGRESQL_PORT}
      - POSTGRESQL_DB=${POSTGRESQL_DB}
      - ELASTICSEARCH_ENABLED=${ELASTICSEARCH_ENABLED}
      - ELASTICSEARCH_HOST=${ELASTICSEARCH_HOST}
      - ELASTICSEARCH_PORT=${ELASTICSEARCH_PORT}
      - ELASTICSEARCH_SCHEMA=${ELASTICSEARCH_SCHEMA}
      - ELASTICSEARCH_NAMESPACE=${ELASTICSEARCH_NAMESPACE}
      - MEMCACHE_SERVERS=${MEMCACHE_SERVERS}
      - REDIS_URL=${REDIS_URL}
      - RAILS_ENV=${RAILS_ENV}
      - RAILS_LOG_STDOUT=${RAILS_LOG_STDOUT}
      - ZAMMAD_FQDN=${ZAMMAD_FQDN}
    volumes:
      - zammad-storage:/opt/zammad/storage
    networks:
      - backend
      - frontend

  # ----------------------------------------------------------
  # 6. POSTGRESQL: Database utama Zammad
  #    ISOLASI: Hanya di jaringan "backend"
  #    Dipaksa ke manager node untuk persistensi data volume
  # ----------------------------------------------------------
  zammad-postgresql:
    image: postgres:15-alpine
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
        window: 120s
      placement:
        constraints:
          - node.role == manager
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: zammad_production
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d zammad_production"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  # ----------------------------------------------------------
  # 7. ELASTICSEARCH: Search engine untuk Zammad
  #    ISOLASI: Hanya di jaringan "backend"
  # ----------------------------------------------------------
  zammad-elasticsearch:
    image: elasticsearch:8.12.2
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 5
        window: 120s
      placement:
        constraints:
          - node.role == manager
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - backend

  # ----------------------------------------------------------
  # 8. MEMCACHED: Cache untuk session & performa
  #    ISOLASI: Hanya di jaringan "backend"
  # ----------------------------------------------------------
  zammad-memcached:
    image: memcached:1.6-alpine
    command: memcached -m 256M
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
        window: 120s
    networks:
      - backend

  # ----------------------------------------------------------
  # 9. REDIS: Queue & pub/sub untuk background jobs
  #    ISOLASI: Hanya di jaringan "backend"
  # ----------------------------------------------------------
  zammad-redis:
    image: redis:7-alpine
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
        window: 120s
    volumes:
      - redis-data:/data
    networks:
      - backend

  # ----------------------------------------------------------
  # 10. TRAEFIK: Reverse proxy + SSL termination
  #     - Wajib di manager node (butuh Docker socket)
  #     - Port 80  : HTTP → redirect ke HTTPS
  #     - Port 443 : HTTPS (SSL termination)
  #     - Port 8088: Traefik dashboard (akses via http://172.21.3.99:8088)
  # ----------------------------------------------------------
  traefik:
    image: traefik:3.1
    environment:
      - DOCKER_API_VERSION=1.41
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
        window: 120s
      placement:
        constraints:
          - node.role == manager   # Hanya manager yang punya Docker socket
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./traefik/ssl:/etc/traefik/ssl:ro  # Sertifikat SSL
    networks:
      - proxy
      - frontend

  # ----------------------------------------------------------
  # 11. PORTAINER: GUI manajemen Docker Swarm
  #     - Akses via: http://172.21.3.99:9000
  #     - HTTPS via: https://172.21.3.99:9443
  #     - Wajib di manager node
  # ----------------------------------------------------------
  portainer:
    image: portainer/portainer-ce:latest
    command: -H tcp://tasks.portainer-agent:9001 --tlsskipverify
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
        window: 120s
      placement:
        constraints:
          - node.role == manager
    ports:
      - target: 9000
        published: 8080
        protocol: tcp
        mode: host   # GUI Portainer (HTTP) melalui port 8080
    volumes:
      - portainer-data:/data
    networks:
      - portainer-net

  # ----------------------------------------------------------
  # 12. PORTAINER AGENT: Agent di setiap node Swarm
  #     - Mode global: berjalan di SEMUA node Swarm
  #     - Portainer menghubungi agent untuk info container/volume
  # ----------------------------------------------------------
  portainer-agent:
    image: portainer/agent:latest
    deploy:
      mode: global   # Satu instance per node Swarm
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
        window: 120s
    environment:
      AGENT_CLUSTER_ADDR: tasks.portainer-agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/volumes:/var/lib/docker/volumes:ro
    networks:
      - portainer-net

# ==============================================================
#  VOLUMES: Persistent data storage
# ==============================================================
volumes:
  elasticsearch-data:
    driver: local
  postgresql-data:
    driver: local
  redis-data:
    driver: local
  zammad-storage:
    driver: local
  portainer-data:
    driver: local

# ==============================================================
#  NETWORKS: Overlay networks untuk Docker Swarm
#
#  [backend]      → DB layer: PostgreSQL, ES, Memcached, Redis
#                   Bersifat internal (tidak ada akses keluar)
#
#  [frontend]     → App layer: Nginx, Rails, Websocket, Scheduler
#                   Komunikasi antar service Zammad
#
#  [proxy]        → Traefik ↔ zammad-nginx
#                   Traefik forward request ke app
#
#  [portainer-net]→ portainer ↔ portainer-agent
# ==============================================================
networks:
  backend:
    driver: overlay
    attachable: true
    internal: true   # Tidak ada akses internet langsung
    name: zammad-backend

  frontend:
    driver: overlay
    attachable: true
    name: zammad-frontend

  proxy:
    driver: overlay
    attachable: true
    name: zammad-proxy

  portainer-net:
    driver: overlay
    attachable: true
    name: portainer-net
