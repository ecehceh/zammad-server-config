version: "3.9"

services:
  # ----------------------------------------------------------
  # 1. PORTAINER: GUI manajemen Docker Swarm
  #    - Akses via: http://<NODE_IP>:8080
  #    - Wajib di manager node
  # ----------------------------------------------------------
  portainer:
    image: portainer/portainer-ce:latest
    command: -H tcp://tasks.portainer-agent:9001 --tlsskipverify
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
        window: 120s
      placement:
        constraints:
          - node.role == manager
    ports:
      - target: 9000
        published: 8080
        protocol: tcp
        mode: host   # GUI Portainer (HTTP) melalui port 8080
    volumes:
      - portainer-data:/data
    networks:
      - portainer-net

  # ----------------------------------------------------------
  # 2. PORTAINER AGENT: Agent di setiap node Swarm
  #    - Mode global: berjalan di SEMUA node Swarm
  #    - Portainer menghubungi agent untuk info container/volume
  # ----------------------------------------------------------
  portainer-agent:
    image: portainer/agent:latest
    deploy:
      mode: global   # Satu instance per node Swarm
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
        window: 120s
    environment:
      AGENT_CLUSTER_ADDR: tasks.portainer-agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/volumes:/var/lib/docker/volumes:ro
    networks:
      - portainer-net

# ==============================================================
#  VOLUMES
# ==============================================================
volumes:
  portainer-data:
    driver: local

# ==============================================================
#  NETWORKS
# ==============================================================
networks:
  portainer-net:
    driver: overlay
    attachable: true
