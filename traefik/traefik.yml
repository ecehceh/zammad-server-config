# ============================================================
#  Traefik - Static Configuration
#  File ini dimuat saat Traefik pertama kali start.
#  Untuk routing dinamis Zammad, lihat: ./dynamic/zammad.yml
#
#  Versi  : Traefik v3.0
#  Mode   : Docker Compose (standalone)
#  Server : 172.21.3.99
# ============================================================

# Dashboard dimatikan sesuai aturan firewall

# ── Entry Points ─────────────────────────────────────────────
entryPoints:
  # Port 80: HTTP — otomatis redirect ke HTTPS
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true   # 301 Permanent Redirect

  # Port 443: HTTPS — SSL termination di sini
  websecure:
    address: ":443"

# ── Providers ────────────────────────────────────────────────
providers:
  # Docker provider: auto-discovery container via labels
  # exposedByDefault: false → container hanya aktif jika ada label traefik.enable=true
  docker:
    endpoint: "unix:///var/run/docker.sock"
    swarmMode: true          # Wajib untuk Docker Swarm (docker stack deploy)
    exposedByDefault: false
    network: zammad-proxy    # Network default untuk Traefik → service

  # File provider: routing statik untuk Zammad + konfigurasi TLS
  # Digunakan karena zammad-nginx tidak menggunakan labels
  file:
    directory: /etc/traefik/dynamic
    watch: true   # hot-reload jika file berubah tanpa restart container

# ── Logging ──────────────────────────────────────────────────
log:
  level: INFO   # DEBUG | INFO | WARN | ERROR

accessLog: {}   # Aktifkan access log
