# ============================================================
#  Nginx Reverse Proxy - SSL/TLS Termination untuk Zammad
# ============================================================

# Redirect semua HTTP (port 80) → HTTPS (port 443)
server {
    listen 80;
    server_name localhost;

    # Redirect permanen ke HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS server - SSL/TLS Termination
server {
    listen 443 ssl;
    server_name localhost;

    # ── SSL Certificate ──────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/zammad.crt;
    ssl_certificate_key /etc/nginx/ssl/zammad.key;

    # ── SSL/TLS Protocol & Cipher (hardening) ────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # ── Security Headers ─────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN                             always;
    add_header X-Content-Type-Options    nosniff                                always;
    add_header X-XSS-Protection          "1; mode=block"                        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;

    # ── Proxy Settings ───────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Port  443;

    # ── Buffer & Timeout ─────────────────────────────────────
    proxy_connect_timeout   90s;
    proxy_send_timeout      90s;
    proxy_read_timeout      90s;
    proxy_buffers           32 4k;
    client_max_body_size    50M;

    # ── WebSocket Support (untuk Zammad real-time) ───────────
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";

    # ── Forward semua request ke Zammad internal (HTTP) ──────
    location / {
        proxy_pass http://zammad-nginx:8080;
    }
}